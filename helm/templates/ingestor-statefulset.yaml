{{- if .Values.parseable.highAvailability.enabled }}
{{- $common := .Values.parseable.common }}
{{- $node := .Values.parseable.nodes.ingestor }}
{{- $secret := .Values.parseable.secrets }}
{{- $cred := .Values.parseable.credentialFile }}
{{- $audit := .Values.parseable.auditLogging }}
{{- $env := merge (deepCopy ($node.env | default dict)) ($common.env | default dict) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "parseable.fullname" . }}-ingestor-headless
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 8000
      name: "parseable-port"
  clusterIP: None
  selector:
    {{- include "parseable.ingestorLabelsSelector" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "parseable.fullname" . }}-ingestor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "parseable.ingestorLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "parseable.ingestorLabelsSelector" . | nindent 6 }}
  serviceName: {{ include "parseable.fullname" . }}-ingestor-headless
  replicas: {{ $node.count }}
  minReadySeconds: 2
  template:
    metadata:
      {{- with ($node.podAnnotations | default $common.podAnnotations) }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with ($node.podLabels | default $common.podLabels) }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "parseable.ingestorLabelsSelector" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 10
      serviceAccountName: {{ include "parseable.serviceAccountName" . }}
      securityContext:
        {{- toYaml $common.podSecurityContext | nindent 8 }}
      {{- with ($node.nodeSelector | default $common.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($node.tolerations | default $common.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($node.affinity | default $common.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # ingestors register against the querier, so wait for it to be ready first
      initContainers:
        - name: wait-for-query-service
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for query service readiness at /api/v1/readiness..."
              for i in $(seq 1 60); do
                if curl -sf http://{{ include "parseable.fullname" . }}-querier-service.{{ .Release.Namespace }}/api/v1/readiness; then
                  echo "Query service is ready!"
                  exit 0
                fi
                echo "Query service is not ready yet. Retrying in 2 seconds..."
                sleep 2
              done
              echo "Query service did not become ready in time. Exiting."
              exit 1
      {{- if $cred.enabled }}
      volumes:
        - name: {{ $cred.secretName }}
          secret:
            secretName: {{ $cred.secretName }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml $common.securityContext | nindent 12 }}
          image: "{{ .Values.parseable.image.repository }}:{{ .Values.parseable.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.parseable.image.pullPolicy }}
          args:
            - "/usr/bin/parseable"
            - {{ .Values.parseable.store | quote }}
            - --ingestor-endpoint=$(HOSTNAME).{{ include "parseable.fullname" . }}-ingestor-headless.{{ .Release.Namespace }}.svc.cluster.local:{{ $node.port }}
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: P_MODE
              value: "ingest"
            # common.env merged with nodes.ingestor.env (node wins)
            {{- range $key, $value := $env }}
            - name: {{ $key }}
              value: {{ tpl $value $ | quote }}
            {{- end }}
            # credentials from the secret in .Values.parseable.secrets
            {{- if and $secret $secret.name $secret.keys }}
            {{- $prefix := $secret.prefix | default "" | upper }}
            {{- range $key := $secret.keys }}
            - name: {{ $prefix }}{{ $key | upper | replace "." "_" | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret.name }}
                  key: {{ $key }}
            {{- end }}
            {{- end }}
            {{- if $cred.enabled }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "{{ $cred.mountPath }}/{{ $cred.secretKey }}"
            {{- end }}
            {{- if $audit.enabled }}
            - name: P_AUDIT_LOGGER
              value: {{ $audit.p_server | quote }}
            - name: P_AUDIT_USERNAME
              value: {{ $audit.p_username | quote }}
            - name: P_AUDIT_PASSWORD
              value: {{ $audit.p_password | quote }}
            {{- end }}
          ports:
            - containerPort: {{ $node.port }}
          {{- with ($node.readinessProbe | default $common.readinessProbe) }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml ($node.resources | default $common.resources) | nindent 12 }}
          {{- if or $node.persistence.enabled $cred.enabled }}
          volumeMounts:
            {{- if $node.persistence.enabled }}
            - name: stage-volume
              mountPath: "/parseable/staging"
            {{- end }}
            {{- if $cred.enabled }}
            - name: {{ $cred.secretName }}
              mountPath: {{ $cred.mountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
  {{- if $node.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: stage-volume
      spec:
        accessModes:
          - {{ $node.persistence.accessMode | quote }}
        storageClassName: {{ $node.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ $node.persistence.size | quote }}
  {{- end }}
{{- end }}
