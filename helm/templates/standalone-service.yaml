{{- if not .Values.parseable.highAvailability.enabled }}
{{- $svc := .Values.parseable.nodes.standalone.service }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "parseable.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "parseable.labelsSelector" . | nindent 4 }}
spec:
  type: {{ $svc.type }}
  ports:
    - port: {{ $svc.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "parseable.labelsSelector" . | nindent 4 }}
{{- end }}
