{{- if .Values.parseable.highAvailability.enabled }}
{{- $common := .Values.parseable.common }}
{{- $node := .Values.parseable.nodes.query }}
{{- $secret := .Values.parseable.secrets }}
{{- $cred := .Values.parseable.credentialFile }}
{{- $audit := .Values.parseable.auditLogging }}
{{- $env := merge (deepCopy ($node.env | default dict)) ($common.env | default dict) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "parseable.fullname" . }}-querier-headless
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 8000
      name: "parseable-port"
  clusterIP: None
  selector:
    {{- include "parseable.querierLabelsSelector" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "parseable.fullname" . }}-querier
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "parseable.querierLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "parseable.querierLabelsSelector" . | nindent 6 }}
  serviceName: {{ include "parseable.fullname" . }}-querier-headless
  replicas: 1
  minReadySeconds: 2
  template:
    metadata:
      {{- with ($node.podAnnotations | default $common.podAnnotations) }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with ($node.podLabels | default $common.podLabels) }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "parseable.querierLabelsSelector" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 10
      serviceAccountName: {{ include "parseable.serviceAccountName" . }}
      securityContext:
        {{- toYaml $common.podSecurityContext | nindent 8 }}
      {{- with ($node.nodeSelector | default $common.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($node.tolerations | default $common.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($node.affinity | default $common.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if $cred.enabled }}
        - name: {{ $cred.secretName }}
          secret:
            secretName: {{ $cred.secretName }}
        {{- end }}
        - name: stage-volume
          emptyDir: {}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml $common.securityContext | nindent 12 }}
          image: "{{ .Values.parseable.image.repository }}:{{ .Values.parseable.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.parseable.image.pullPolicy }}
          args: [ "/usr/bin/parseable", {{ .Values.parseable.store | quote }} ]
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: P_MODE
              value: "query"
            {{- if $node.persistence.enabled }}
            - name: P_HOT_TIER_DIR
              value: "/parseable/hot-tier"
            - name: P_MAX_DISK_USAGE_PERCENT
              value: "95.0"
            {{- end }}
            # common.env merged with nodes.query.env (node wins)
            {{- range $key, $value := $env }}
            - name: {{ $key }}
              value: {{ tpl $value $ | quote }}
            {{- end }}
            # credentials from the secret in .Values.parseable.secrets
            {{- if and $secret $secret.name $secret.keys }}
            {{- $prefix := $secret.prefix | default "" | upper }}
            {{- range $key := $secret.keys }}
            - name: {{ $prefix }}{{ $key | upper | replace "." "_" | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret.name }}
                  key: {{ $key }}
            {{- end }}
            {{- end }}
            {{- if $cred.enabled }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "{{ $cred.mountPath }}/{{ $cred.secretKey }}"
            {{- end }}
            {{- if $audit.enabled }}
            - name: P_AUDIT_LOGGER
              value: {{ $audit.p_server | quote }}
            - name: P_AUDIT_USERNAME
              value: {{ $audit.p_username | quote }}
            - name: P_AUDIT_PASSWORD
              value: {{ $audit.p_password | quote }}
            {{- end }}
          ports:
            - containerPort: 8000
          {{- with ($node.readinessProbe | default $common.readinessProbe) }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml ($node.resources | default $common.resources) | nindent 12 }}
          volumeMounts:
            - name: stage-volume
              mountPath: "/parseable/staging"
            {{- if $node.persistence.enabled }}
            - name: hot-tier-volume
              mountPath: "/parseable/hot-tier"
            {{- end }}
            {{- if $cred.enabled }}
            - name: {{ $cred.secretName }}
              mountPath: {{ $cred.mountPath }}
              readOnly: true
            {{- end }}
  {{- if $node.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: hot-tier-volume
      spec:
        accessModes:
          - {{ $node.persistence.accessMode | quote }}
        storageClassName: {{ $node.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ $node.persistence.size | quote }}
  {{- end }}
{{- end }}
