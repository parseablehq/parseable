parseable:
  image:
    repository: quay.io/parseablehq/parseable
    tag: "v2.8.0"
    pullPolicy: Always
  imagePullSecrets: []

  # local-store, s3-store, blob-store or gcs-store
  store: local-store

  # false = single Deployment; true = querier + ingestors (needs an object store)
  highAvailability:
    enabled: false

  serviceAccount:
    create: true
    name: "parseable"
    annotations: {}

  nameOverride: ""
  fullnameOverride: ""

  # each key is set as an env var: prefix + upper-cased key, "." "-" -> "_"
  secrets:
    name: parseable-env-secret
    prefix: P_
    keys:
      - addr
      - username
      - password
      - staging.dir
      - fs.dir

  # file credential (e.g. GCS key.json); sets GOOGLE_APPLICATION_CREDENTIALS
  credentialFile:
    enabled: false
    secretName: parseable-env-secret
    secretKey: key.json
    mountPath: /var/secrets/google

  auditLogging:
    enabled: false
    p_server: ""
    p_username: ""
    p_password: ""

  # defaults for every node; a node under nodes: can override any of these
  common:
    env:
      RUST_LOG: warn
    resources:
      limits:
        cpu: 500m
        memory: 4Gi
      requests:
        cpu: 250m
        memory: 1Gi
    readinessProbe:
      httpGet:
        path: /api/v1/readiness
        port: 8000
    securityContext:
      allowPrivilegeEscalation: false
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: "Always"
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "80"
      prometheus.io/path: "/api/v1/metrics"
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

  # per-node overrides; env is merged with common (node wins), rest replaces
  nodes:
    standalone:
      env: {}
      service:
        type: ClusterIP
        port: 80
      persistence:
        staging:
          enabled: true
          storageClass: ""
          accessMode: ReadWriteOnce
          size: 5Gi
        data:
          enabled: false
          storageClass: ""
          accessMode: ReadWriteOnce
          size: 5Gi

    query:
      env: {}
      service:
        type: ClusterIP
        port: 80
      # enables the hot tier; not supported with local-store
      persistence:
        enabled: false
        storageClass: ""
        accessMode: ReadWriteOnce
        size: 100Gi

    ingestor:
      count: 3
      port: 8000
      env: {}
      service:
        type: ClusterIP
        port: 80
      persistence:
        enabled: false
        storageClass: ""
        accessMode: ReadWriteOnce
        size: 5Gi
